name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      # ---- Migrate Neon (uses prod DATABASE_URL/DIRECT_URL secrets) ----
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy against Neon
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm prisma migrate deploy

      # ---- Build + push Docker image to GitHub Container Registry ----
      - name: Compute lowercase image name
        id: image
        run: |
          name=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Trigger remote `docker compose pull && up -d` ----
      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write the private key, normalizing line endings, ensuring trailing newline.
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Sanity-check the key parses
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          # Trust the host
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull image and recreate container on VPS
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$SSH_USER@$SSH_HOST" "\
            cd /docker/callbotcompare && \
            docker compose pull && \
            docker compose up -d --remove-orphans && \
            docker image prune -f"

      # ---- Smoke check ----
      - name: Smoke check production
        run: |
          set -euo pipefail
          url="${SITE_URL%/}"
          for path in / /vendors; do
            echo "Checking $url$path"
            ok=""
            for attempt in $(seq 1 30); do
              code=$(curl -fsSI -o /dev/null -w '%{http_code}' "$url$path" || true)
              if [ "$code" = "200" ]; then
                echo "  $path -> $code"
                ok=1
                break
              fi
              echo "  attempt $attempt: $code, retrying in 4s…"
              sleep 4
            done
            if [ -z "$ok" ]; then
              echo "::error::Smoke check failed for $path"
              exit 1
            fi
          done
