name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma schema validation needs a syntactically-valid URL but never
      # connects in CI. The deploy workflow uses the real Neon secrets.
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub?sslmode=disable
      DIRECT_URL: postgresql://stub:stub@localhost:5432/stub?sslmode=disable
      SITE_URL: https://calltreo.com
      NEXT_PUBLIC_SITE_URL: https://calltreo.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
